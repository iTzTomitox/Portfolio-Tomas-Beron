    <main>

        <div class="grid-container-contacto">

            <section class="contacto">
                <h1>Contacto</h1>
                <img src="../assent/pic.jpeg" alt="Imagen">
            </section>
            
            <section class="grid-container-contacto-form">
                <div class="form-container">
                    <form>
                        <label for="form-input-name" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="form-input-name" name="sender_name" required>
                        
                        <label for="form-input-email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="form-input-email" name="sender_email" required>
                        
                        <textarea class="form-control" id="form-input-mensaje" placeholder="Leave a comment here"
                        name="sender_message" required></textarea>
                        <label for="form-input-mensaje">Mensaje</label>
                        
                        <button type="submit" class="button-form">Enviar</button>
                    </form>
                </div>
            </section>
        </div>
